name: توليد فيديو فيروسي
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الفيديو'
        required: true
        default: 'قصة نجاح'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          npm install
          pip install google-genai

      - name: Generate Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generate.js "${{ github.event.inputs.topic }}"

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: viral-video
          path: output/video.mp4
