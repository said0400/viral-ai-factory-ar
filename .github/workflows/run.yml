name: توليد فيديو فيروسي
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الفيديو'
        required: true
        default: 'قصة نجاح ملهمة'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm install && pip install google-genai
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npm start "${{ github.event.inputs.topic }}"
      - uses: actions/upload-artifact@v4
        with: { name: viral-video, path: output/video.mp4 }
